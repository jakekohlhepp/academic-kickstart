{{/* Site-specific CSS. Injected into <head> via the theme's site_head.html
     (`{{ partial "custom_head" . }}`), so no theme files need to be edited. */}}
<style>
  /* --- Collapsible publication abstract ---------------------------------- */
  .pub-abstract-details {
    margin: 0 0 1.5rem;
  }
  .pub-abstract-details > summary {
    cursor: pointer;
    font-size: 1.25rem;
    font-weight: 500;
    list-style: none;          /* hide default marker (Firefox) */
  }
  .pub-abstract-details > summary::-webkit-details-marker {
    display: none;             /* hide default marker (WebKit) */
  }
  .pub-abstract-details > summary:focus-visible {
    outline: 2px solid currentColor;   /* keyboard focus ring (WCAG 2.4.7) */
    outline-offset: 2px;
  }
  .pub-abstract-details > summary:focus:not(:focus-visible) {
    outline: none;             /* suppress ring for mouse clicks only */
  }
  .pub-abstract-details > summary::before {
    content: "\25B8";          /* ▸ */
    display: inline-block;
    margin-right: .5rem;
    font-size: .85em;
    transition: transform .15s ease;
  }
  .pub-abstract-details[open] > summary::before {
    transform: rotate(90deg);
  }
  .pub-abstract-details > .pub-abstract {
    margin-top: .75rem;
  }

  /* --- Presentations & awards lists ------------------------------------- */
  .pub-presentations,
  .pub-awards {
    margin: 0;
    padding-left: 1.1rem;
  }
  .pub-presentations li,
  .pub-awards li {
    margin-bottom: .35rem;
  }
  .pub-presentations li p,
  .pub-awards li p {
    margin: 0;                 /* markdownify wraps each entry in <p> */
  }

  /* --- External coauthor link affordance -------------------------------- */
  .coauthor-ext-icon {
    font-size: .7em;
    margin-left: .25em;
    opacity: .55;
    vertical-align: super;
  }

  /* --- Compact homepage publication cards ------------------------------- */
  .card-simple {
    margin-top: 10px;          /* was 20px — less space between entries */
    padding: 12px 18px;        /* was 15px 20px */
  }
  .card-simple .article-metadata { margin-bottom: 0; }
  .card-simple .pub-abstract-details { margin: .35rem 0 0; }
  .card-simple .pub-abstract-details > summary { font-size: 1rem; }
  .card-simple .card-extra {
    font-size: .72rem;
    line-height: 1.4;
    margin-top: .3rem;
  }
  .card-simple .card-extra-label { font-weight: 700; }
  .card-simple .btn-links { margin-top: .5rem; margin-bottom: 0; }

  /* --- Publication status pills (see page_metadata.html override) -------- */
  .pub-status {
    display: inline-block;
    padding: .05rem .55rem;
    border-radius: 10rem;
    font-size: .72rem;
    font-weight: 700;
    line-height: 1.5;
    vertical-align: middle;
  }
  .pub-status-pub  { background: #e3f4e8; color: #1e7e34; }   /* published */
  .pub-status-rr   { background: #fff3cd; color: #856404; }   /* revise & resubmit */
  .pub-status-note { background: #e8edf3; color: #44546a; }   /* draft/new/etc. */
  .dark .pub-status-pub  { background: #1e4620; color: #8fe2ae; }
  .dark .pub-status-rr   { background: #4d3a06; color: #ffd97a; }
  .dark .pub-status-note { background: #323b4d; color: #b6c2d9; }

  /* --- Optional per-paper figure thumbnail on cards ----------------------
     Add a `featured.png` (or .jpg) key figure to a paper's folder and it
     shows as a compact right-floated thumbnail (see li_card.html). */
  .card-simple .card-thumb-link { float: right; margin: 0 0 .5rem 1rem; }
  .card-simple .card-thumb { width: 150px; height: auto; border-radius: 3px; }
  @media screen and (max-width: 576px) {
    .card-simple .card-thumb { width: 90px; }
  }
</style>
